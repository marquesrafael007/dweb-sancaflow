 <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SancaFlow</title>
    <link rel="stylesheet" href="css/global.css">
    <style>
        img {
       width: 150px;
       height: 150px;
       border: 2px dashed #aaa;
       border-radius: 10px;
       display: flex;
       justify-content: center;
       align-items: center;

       font-size: 40px;
       color: #666;

       cursor: pointer;   
    }
    </style>
</head>

<body>
    
    <main>
        <div class="text"><h1>Novo evento</h1></div>

            <div class="form">
                <form id="formEventos">
                    
                        <input type="text" id="name" name="name" placeholder="Nome do evento" required>
                        <input type="text" id="description" name="description" placeholder="Descrição" maxlength="300" required>
                        <input type="text" id="Address" placeholder="Endereço" required>
                        <input type="text" id="Institution" placeholder="Instituição" required>
                        <input type="text" id="responsible" placeholder="Responsáveis pelo evento">
                        <input type="text" id="contact" placeholder="Contato" required>
                        <input type="date" id="date" placeholder="Data" required>
                        <input type="time" id="time" placeholder="Horário" required>
                        <input type="number" id="price" placegolder="Valor(se houver)" step="0.01" inputmode="decimal">
            
                        <input id="submit" id="" type="submit" value="Enviar">
                
                </form>
            </div>
		<h2>Eventos Cadastrados</h2>

<table id="tabelaEventos">
    <thead>
        <tr>
            <th>ID</th>
            <th>Descrição</th>
            <th>Instituição</th>
            <th>Data</th>
            <th>Horário</th>
            <th>Contato</th>
            <th>Ações</th>
        </tr>
    </thead>

        <tbody>
            <!-- Eventos serão inseridos aqui -->
        </tbody>
    </table>     
</main>

<script>
// ==================== CONFIGURAÇÃO ====================

const API_URL = window.location.origin.includes('localhost')
    ? 'http://localhost:3000/api/eventos'
    : '/api/eventos';


// ==================== INSERT ====================

document.getElementById('formEventos').addEventListener('submit', async (e) => {

    e.preventDefault();

    const dados = {
        nome: document.getElementById('name').value,
        descricao: document.getElementById('description').value,
        endereco: document.getElementById('Address').value,
        instituicao: document.getElementById('Institution').value,
        responsaveis_evento: document.getElementById('responsible').value,
        contato: document.getElementById('contact').value,
        data_evento: document.getElementById('date').value,
        hora_evento: document.getElementById('time').value,
        valor: parseFloat(document.getElementById('price').value) || 0
    };

    try {

        const response = await fetch(API_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(dados)
        });

        const resultado = await response.text();

        if (!response.ok) {
            alert(resultado);
            console.error(resultado);
            return;
        }

        alert('Evento cadastrado com sucesso!');

        document.getElementById('formEventos').reset();

        carregarEventos();

    } catch (error) {

        console.error(error);
        alert('Erro ao conectar com a API');

    }

});


// ==================== SELECT ====================

async function carregarEventos() {

    try {

        const response = await fetch(API_URL);

        if (!response.ok) {
            throw new Error('Erro ao carregar eventos');
        }

        const eventos = await response.json();

        const tbody = document.querySelector('#tabelaEventos tbody');

        tbody.innerHTML = '';

        eventos.forEach(evento => {

            tbody.innerHTML += `
                <tr>
                    <td>${evento.id || ''}</td>
                    <td>${evento.nome || ''}</td>
                    <td>${evento.descricao || ''}</td>
                    <td>${evento.endereco || ''}</td>
                    <td>${evento.instituicao || ''}</td>
                    <td>${evento.responsaveis_evento || ''}</td>
                    <td>${evento.contato || ''}</td>
                    <td>${evento.data_evento || ''}</td>
                    <td>${evento.hora_evento || ''}</td>
                    <td>R$ ${evento.valor || 0}</td>

                    <td>
                        <button onclick="editarEvento(${evento.id})">
                            Editar
                        </button>

                        <button onclick="excluirEvento(${evento.id})">
                            Excluir
                        </button>
                    </td>
                </tr>
            `;
        });

    } catch (error) {

        console.error(error);

    }

}


// ==================== UPDATE ====================

async function editarEvento(id) {

    const nome = prompt('Nome do evento:');
    if (nome === null) return;

    const descricao = prompt('Descrição:');
    const endereco = prompt('Endereço:');
    const instituicao = prompt('Instituição:');
    const responsaveis_evento = prompt('Responsáveis pelo evento:');
    const contato = prompt('Contato:');
    const data_evento = prompt('Data (AAAA-MM-DD):');
    const hora_evento = prompt('Horário (HH:MM):');
    const valor = prompt('Valor:');

    try {

        const response = await fetch(`${API_URL}/${id}`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                nome,
                descricao,
                endereco,
                instituicao,
                responsaveis_evento,
                contato,
                data_evento,
                hora_evento,
                valor
            })
        });

        const resultado = await response.text();

        if (!response.ok) {
            alert(resultado);
            console.error(resultado);
            return;
        }

        alert('Evento atualizado com sucesso!');

        carregarEventos();

    } catch (error) {

        console.error(error);
        alert('Erro ao atualizar evento');

    }

}


// ==================== DELETE ====================

async function excluirEvento(id) {

    const confirmar = confirm(
        'Deseja realmente excluir este evento?'
    );

    if (!confirmar) return;

    try {

        const response = await fetch(`${API_URL}/${id}`, {
            method: 'DELETE'
        });

        const resultado = await response.text();

        if (!response.ok) {
            alert(resultado);
            console.error(resultado);
            return;
        }

        alert('Evento excluído com sucesso!');

        carregarEventos();

    } catch (error) {

        console.error(error);
        alert('Erro ao excluir evento');

    }

}


// ==================== INICIALIZAÇÃO ====================

carregarEventos();

</script>
</body>
</html>
