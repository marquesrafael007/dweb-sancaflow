<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SancaFlow</title>
    <link rel="stylesheet" href="css/global.css">
</head>

<body>
    <main>
        <div class="text">
            <h1>Cadastre uma Instituição</h1>
        </div>
        <div class="form">
            <form id="formInstituicao">
                <input type="text" id="nome" placeholder="Nome da Instituição" required>
                <input type="text" id="cnpj" placeholder="00.000.000/0000-00" maxlength="18" required>
                <input type="text" id="endereco" placeholder="Endereço" required>
                <input type="text" id="cep" placeholder="CEP" required>
                <input type="text" id="telefone" placeholder="Telefone" required>
                <input class="submit" type="submit" value="Enviar">
            </form>

            <table id="tabelaInstituicoes">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>CNPJ</th>
                        <th>Endereço</th>
                        <th>CEP</th>
                        <th>Telefone</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela">
                </tbody>
            </table>

            <script>
                const API_URL = window.location.origin.includes('localhost')
                    ? 'https://d-web-sanca-flow.vercel.app/api/instituicao'
                    : '/api/instituicao';

                // 1. Função para enviar os dados do formulário
                document.getElementById('formInstituicao').addEventListener('submit', async (e) => {
                    e.preventDefault(); // Impede a página de recarregar

                    const dados = {
                        Nome: document.getElementById('nome').value,
                        CNPJ: document.getElementById('cnpj').value,
                        Endereço: document.getElementById('endereco').value, // Note que mandamos com acento para bater com seu back-end atual
                        CEP: document.getElementById('cep').value,
                        Telefone: document.getElementById('telefone').value
                    };

                    try {
                        const response = await fetch(API_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(dados)
                        });

                        if (response.ok) {
                            alert('Instituição cadastrada com sucesso!');
                            document.getElementById('formInstituicao').reset();
                            carregarInstituicoes(); // Atualiza a tabela automaticamente
                        } else {
                            alert('Erro ao cadastrar.');
                        }
                    } catch (error) {
                        console.error('Erro na requisição:', error);
                    }
                });

                // 2. Função para buscar os dados do banco e montar a tabela
                async function carregarInstituicoes() {
                    try {
                        const response = await fetch(API_URL);
                        const dados = await response.json();

                        const corpoTabela = document.getElementById('corpoTabela');
                        corpoTabela.innerHTML = ''; // Limpa a tabela antes de preencher

                        dados.forEach(inst => {
                            const linha = `
                            <tr>
                            <td>${inst.Nome}</td>
                            <td>${inst.CNPJ}</td>
                            <td>${inst.Endereço || inst.Endereco}</td> 
                            <td>${inst.CEP}</td>
                            <td>${inst.Telefone}</td>
                            <td>
                                <button onclick="prepararEdicao('${inst.id}', '${inst.Nome}')" style="background: #ffc107;">Editar</button>
                                <button onclick="excluirInstituicao('${inst.id}')" style="background: #dc3545; color: white;">  Excluir</button>
                            </td>
                            </tr>
                        `;
                            corpoTabela.innerHTML += linha;
                        });
                    } catch (error) {
                        console.error('Erro ao carregar tabela:', error);
                    }
                }
                // FUNÇÃO PARA EXCLUIR
                async function excluirInstituicao(id) {
                    if (!confirm('Tem certeza que deseja excluir esta instituição?')) return;

                    try {
                        const response = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                        if (response.ok) {
                            alert('Excluído!');
                            carregarInstituicoes(); // Recarrega a lista
                        }
                    } catch (error) {
                        console.error('Erro ao deletar:', error);
                    }
                }

                // FUNÇÃO PARA EDITAR (Simples)
                async function prepararEdicao(id, nomeAtual) {
                    const novoNome = prompt("Digite o novo nome para: " + nomeAtual);
                    const novoCNPJ = prompt("Digite o novo CNPJ para: " + nomeAtual);
                    const novoEndereco = prompt("Digite o novo Endereço para: " + nomeAtual);
                    const novoCEP = prompt("Digite o novo CEP para: " + nomeAtual);
                    const novoTelefone = prompt("Digite o novo Telefone para: " + nomeAtual);
                    if (!novoNome) return;

                    try {
                        const response = await fetch(`${API_URL}/${id}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ Nome: novoNome, CNPJ: novoCNPJ, Endereço: novoEndereco, CEP: novoCEP, Telefone: novoTelefone }) // Aqui você pode expandir para editar todos os campos
                        });

                        if (response.ok) {
                            alert('Nome atualizado!');
                            carregarInstituicoes();
                        }
                    } catch (error) {
                        console.error('Erro ao editar:', error);
                    }
                }

                carregarInstituicoes();
            </script>
</body>

</html>
