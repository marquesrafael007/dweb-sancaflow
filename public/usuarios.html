<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SancaFlow - Usuários</title>
    <link rel="stylesheet" href="css/global.css">
</head>

<body>
    <main>
        <div class="text">
            <h1>Gerenciamento de Usuários</h1>
        </div>
        <div class="form">
            <form id="formUsuario">
                <input type="text" id="nome" placeholder="Nome Completo" required>
                <input type="text" id="cpf" placeholder="CPF" required>
                <input type="email" id="email" placeholder="E-mail" required>
                <input class="submit" type="submit" value="Cadastrar">
            </form>

            <table id="tabelaUsuarios">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>CPF</th>
                        <th>E-mail</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela">
                    <!-- Dados serão carregados aqui -->
                </tbody>
            </table>
        </div>
    </main>

    <script>
        // ==================== CONFIGURAÇÃO ====================

        const API_URL = window.location.origin.includes('localhost')
            ? 'http://localhost:3000/api/usuarios'
            : '/api/usuarios';


        // ==================== CREATE ====================

        document.getElementById('formUsuario').addEventListener('submit', async (e) => {

            e.preventDefault();

            const dados = {
                nome: document.getElementById('nome').value,
                cpf: document.getElementById('cpf').value,
                email: document.getElementById('email').value
            };

            try {

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(dados)
                });

                if (!response.ok) {
                    alert('Erro ao cadastrar usuário');
                    return;
                }

                alert('Usuário cadastrado com sucesso!');

                document.getElementById('formUsuario').reset();

                carregarUsuarios();

            } catch (error) {

                console.error(error);
                alert('Erro ao conectar com a API');

            }

        });

        // ==================== READ ====================

        async function carregarUsuarios() {

            try {

                const response = await fetch(API_URL);

                if (!response.ok) {
                    throw new Error('Erro ao carregar usuários');
                }

                const usuarios = await response.json();

                const corpoTabela = document.getElementById('corpoTabela');

                corpoTabela.innerHTML = '';

                usuarios.forEach(usuario => {

                    corpoTabela.innerHTML += `
                <tr>

                    <td>${usuario.nome || ''}</td>
                    <td>${usuario.cpf || ''}</td>
                    <td>${usuario.email || ''}</td>

                    <td>
                       <button onclick="editarUsuario(${usuario.id})"
                        style="background: #ffc107; border:none; border-radius:5px;">
                            Editar
                        </button>

                        <button onclick="excluirUsuario(${usuario.id})"
                        style="background: #dc3545; color:white; border:none; border-radius:5px;">
                            Excluir
                        </button>
                    </td>
                </tr>
            `;

                });

            } catch (error) {

                console.error(error);

            }

        }

        // ==================== UPDATE ====================

        async function editarUsuario(id) {

            const nome = prompt('Novo nome:');
            if (nome === null) return;

            const cpf = prompt('Novo CPF:');
            const email = prompt('Novo e-mail:');

            try {

                const response = await fetch(`${API_URL}/${id}`, {

                    method: 'PUT',

                    headers: {
                        'Content-Type': 'application/json'
                    },

                    body: JSON.stringify({
                        nome,
                        cpf,
                        email
                    })

                });

                if (!response.ok) {

                    alert('Erro ao atualizar usuário');
                    return;

                }

                alert('Usuário atualizado com sucesso!');

                carregarUsuarios();

            } catch (error) {

                console.error(error);
                alert('Erro ao atualizar usuário');

            }

        }


        // ==================== DELETE ====================

        async function excluirUsuario(id) {

            const confirmar = confirm(
                'Deseja realmente excluir este usuário?'
            );

            if (!confirmar) return;

            try {

                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE'
                });

                if (!response.ok) {

                    alert('Erro ao excluir usuário');
                    return;

                }

                alert('Usuário excluído com sucesso!');

                carregarUsuarios();

            } catch (error) {

                console.error(error);
                alert('Erro ao excluir usuário');

            }

        }


        // ==================== INICIALIZAÇÃO ====================

        carregarUsuarios();

    </script>
</body>

</html>
