<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SancaFlow</title>
    <link rel="stylesheet" href="css/global.css">
</head>
<body>
    <main>
        <div class="text">
            <h1>Professores</h1>
        </div>
        <div class="form">
            <form id="formsprofessores" action="#" method="post">
                <input type="text" id="nome" placeholder="Nome Completo">
                <input type="text" id="cpf" maxlength="11" placeholder="CPF">
                <input type="date" id="data" placeholder="Data de Nascimento">
                <input class="submit" type="submit" value="Enviar">
            </form>
        </div>
        <div class="table">
            <table>
                <tr></tr>
                <tr></tr>
                <tr></tr>
                <tr></tr>
                <tr></tr>
            </table>
        </div>
    </main>
    <script>

        // ==================== CONFIGURAÇÃO ====================
        const API_URL = window.location.origin.includes('localhost')
            ? 'http://localhost:3000/api/professores'
            : '/api/professores';

        // ==================== INSERT ====================
        document.getElementById('formsprofessores').addEventListener('submit', async (e) => {
            e.preventDefault();

            const dados = {
                nome: document.getElementById('nome').value,
                cpf: document.getElementById('cpf').value,
                data: document.getElementById('data').value,

            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(dados)
                });

                const resultado = await response.text();

                if (!response.ok) {
                    alert(resultado);
                    console.error(resultado);
                    return;
                }

                alert('Professor cadastrado com sucesso!');
                document.getElementById('formsprofessor').reset();
                carregarProfessores();

            } catch (error) {
                console.error(error);
                alert('Erro ao conectar com a API');
            }
        });

        // ==================== SELECT ====================
        async function carregarProfessores() {
            try {
                const response = await fetch(API_URL);

                if (!response.ok) {
                    throw new Error('Erro ao carregar professores');
                }

                const professores = await response.json();
                const tbody = document.querySelector('#professores tbody');
                tbody.innerHTML = '';

                professores.forEach(professores => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${professores.id || ''}</td>
                            <td>${professores.nome || ''}</td>
                            <td>${professores.cpf || ''}</td>
                            <td>${professores.data || ''}</td>

                            <td>
                                <button onclick="editarProfessores(${professores.id})">
                                    Editar
                                </button>
                                <button onclick="excluirProfessores(${professores.id})">
                                    Excluir
                                </button>
                            </td>
                        </tr>
                    `;
                });

            } catch (error) {
                console.error(error);
            }
        }

        // ==================== UPDATE ====================
        async function editarProfessores(id) {
            const nome = prompt('Nome do professor:');
            if (nome === null) return;

            const cpf = prompt('Cpf:');
            const data = prompt('Data de nascimento:');


            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        nome,
                        cpf,
                        data,
                    })
                });

                const resultado = await response.text();

                if (!response.ok) {
                    alert(resultado);
                    console.error(resultado);
                    return;
                }

                alert('Professores atualizado com sucesso!');
                carregarProfessores();

            } catch (error) {
                console.error(error);
                alert('Erro ao atualizar professores');
            }
        }

        // ==================== DELETE ====================
        async function excluirProfessores(id) {
            const confirmar = confirm('Deseja realmente excluir este cadastro?');
            if (!confirmar) return;

            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE'
                });

                const resultado = await response.text();

                if (!response.ok) {
                    alert(resultado);
                    console.error(resultado);
                    return;
                }

                alert('Cadastro excluído com sucesso!');
                carregarProfessores();

            } catch (error) {
                console.error(error);
                alert('Erro ao excluir cadastro');
            }
        }

        // ==================== INICIALIZAÇÃO ====================
        carregarProfessores();
    </script>
</body>
</html>
