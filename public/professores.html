<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SancaFlow</title>
    <link rel="stylesheet" href="css/global.css">
</head>

<body>
    <main>
        <div class="text">
            <h1>Professores</h1>
        </div>
        <div class="form">
            <form id="formsprofessores" action="#" method="post">
                <input type="text" id="nome" placeholder="Nome Completo">
                <input type="text" id="cpf" maxlength="11" placeholder="CPF">
                <input type="date" id="data" placeholder="Data de Nascimento">
                <input class="submit" type="submit" value="Enviar">
            </form>
        </div>
        <div class="table">
            <table>
                <tr></tr>
                <tr></tr>
                <tr></tr>
                <tr></tr>
                <tr></tr>
            </table>
        </div>
    </main>
    <script>

        // ==================== CONFIGURAÇÃO ====================
        const API_URL = window.location.origin.includes('localhost')
            ? 'http://localhost:3000/api/professores'
            : '/api/professores';

        // ==================== INSERT ====================
        document.getElementById('formsprofessores').addEventListener('submit', async (e) => {
            e.preventDefault();

            const dados = {
                nome: document.getElementById('nome').value,
                cpf: document.getElementById('cpf').value,
                data: document.getElementById('data').value
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(dados)
                });

                const resultado = await response.text();

                if (!response.ok) {
                    alert(resultado);
                    console.error(resultado);
                    return;
                }

                alert('Professor cadastrado com sucesso!');

                document.getElementById('formsprofessores').reset();

                carregarProfessores();

            } catch (error) {
                console.error(error);
                alert('Erro ao conectar com a API');
            }
        });

        // ==================== SELECT ====================
        async function carregarProfessores() {
            try {
                const response = await fetch(API_URL);

                if (!response.ok) {
                    throw new Error('Erro ao carregar professores');
                }

                const professores = await response.json();

                const tbody = document.querySelector('#professores tbody');

                if (!tbody) {
                    console.error('Tabela #professores não encontrada');
                    return;
                }

                tbody.innerHTML = '';

                professores.forEach(professor => {
                    tbody.innerHTML += `
                <tr>
                    <td>${professor.id || ''}</td>
                    <td>${professor.nome || ''}</td>
                    <td>${professor.cpf || ''}</td>
                    <td>${professor.data || ''}</td>
                    <td>
                        <button onclick="editarProfessores(${professor.id})">
                            Editar
                        </button>
                        <button onclick="excluirProfessores(${professor.id})">
                            Excluir
                        </button>
                    </td>
                </tr>
            `;
                });

            } catch (error) {
                console.error(error);
            }
        }

        // ==================== UPDATE ====================
        async function editarProfessores(id) {
            const nome = prompt('Nome do professor:');
            if (nome === null) return;

            const cpf = prompt('CPF:');
            if (cpf === null) return;

            const data = prompt('Data de nascimento (AAAA-MM-DD):');
            if (data === null) return;

            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        nome,
                        cpf,
                        data
                    })
                });

                const resultado = await response.text();

                if (!response.ok) {
                    alert(resultado);
                    console.error(resultado);
                    return;
                }

                alert('Professor atualizado com sucesso!');

                carregarProfessores();

            } catch (error) {
                console.error(error);
                alert('Erro ao atualizar professor');
            }
        }

        // ==================== DELETE ====================
        async function excluirProfessores(id) {
            const confirmar = confirm('Deseja realmente excluir este cadastro?');

            if (!confirmar) return;

            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE'
                });

                const resultado = await response.text();

                if (!response.ok) {
                    alert(resultado);
                    console.error(resultado);
                    return;
                }

                alert('Cadastro excluído com sucesso!');

                carregarProfessores();

            } catch (error) {
                console.error(error);
                alert('Erro ao excluir cadastro');
            }
        }

        // ==================== INICIALIZAÇÃO ====================
        carregarProfessores();
    </script>
</body>

</html>
